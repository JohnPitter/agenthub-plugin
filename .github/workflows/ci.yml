name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: server
        run: npm ci
      - name: Typecheck
        working-directory: server
        run: npx tsc --noEmit

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: typecheck
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        working-directory: server
        run: npm ci
      - name: Start server
        working-directory: server
        run: NO_OPEN=1 npx tsx src/index.ts &
        env:
          PORT: 0
      - name: Wait for server
        run: sleep 5
      - name: Run tests
        working-directory: server
        run: npx vitest run src/e2e.test.ts
